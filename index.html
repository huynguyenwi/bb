<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Phương Linh ❤️ BaoBei 🦢</title>
<style>
:root{
  --pink:#ff4f93;
  --pink-soft:#ff9ac8;
  --pink-glow:#ff1493;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;
  background:radial-gradient(120% 120% at 50% 30%,#1a0616 0%,#0a0210 55%,#05010a 100%);
  font-family:"Segoe UI",Arial,sans-serif;-webkit-tap-highlight-color:transparent}

canvas,.ray{position:fixed;inset:0}
canvas{z-index:1;background:transparent}

/* ===== Hero card ===== */
.hero{
  position:fixed;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(92vw,560px);
  padding:clamp(20px,6vw,40px) clamp(16px,5vw,36px);
  text-align:center;z-index:5;
  border-radius:26px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,140,190,.28);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:0 0 60px rgba(255,20,147,.25), inset 0 0 40px rgba(255,120,180,.08);
  animation:float 5s ease-in-out infinite;
  overflow:hidden;
}
/* viền sáng chạy quanh thẻ */
.hero::before{
  content:"";position:absolute;inset:-2px;z-index:-1;border-radius:28px;
  background:conic-gradient(from 0deg,transparent,rgba(255,80,180,.55),transparent 40%);
  animation:spin 6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.hero .top{font-size:clamp(28px,9vw,46px)} /* trái tim to */
.name{
  font-weight:800;line-height:1.15;
  color:#ffd1e8;
  font-size:clamp(26px,7.5vw,54px);   /* chữ vừa màn hình, không quá to */
  text-shadow:0 0 8px var(--pink),0 0 22px var(--pink-glow),0 0 55px var(--pink-glow);
  margin:6px 0;
  letter-spacing:.5px;
  word-break:break-word;
}
.amp{
  display:block;margin:4px 0;
  font-size:clamp(20px,6vw,40px);
  color:var(--pink-soft);
  text-shadow:0 0 14px var(--pink-glow);
  animation:beat 1.4s ease-in-out infinite;
}
.sub{
  margin-top:14px;font-size:clamp(12px,3.4vw,16px);
  color:rgba(255,214,236,.75);letter-spacing:2px;text-transform:uppercase;
}
@keyframes float{50%{transform:translate(-50%,-58%)}}
@keyframes beat{0%,100%{transform:scale(1)}45%{transform:scale(1.25)}}

/* ===== Falling items ===== */
.item{position:fixed;top:-10vh;animation:fall linear forwards;pointer-events:none;will-change:transform}
@keyframes fall{
  0%{transform:translateY(-10vh) translateX(0) rotate(0);opacity:0}
  10%{opacity:1}
  50%{transform:translateY(50vh) translateX(25px) rotate(180deg)}
  100%{transform:translateY(110vh) translateX(-25px) rotate(360deg);opacity:0}}

/* ===== Ambient light ===== */
.ray{width:900px;height:900px;border-radius:50%;filter:blur(80px);
  background:radial-gradient(circle,rgba(255,80,180,.25),transparent 70%);
  animation:pulse 8s infinite}
.r1{left:-250px;top:-250px}.r2{right:-250px;bottom:-250px}
@keyframes pulse{50%{transform:scale(1.3)}}

/* ===== Nút bật/tắt nhạc ===== */
#musicBtn{
  position:fixed;right:16px;bottom:16px;z-index:10;
  width:52px;height:52px;border-radius:50%;
  border:1px solid rgba(255,140,190,.4);
  background:rgba(255,255,255,.08);backdrop-filter:blur(8px);
  color:#ffd1e8;font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 22px rgba(255,20,147,.4);
  transition:transform .2s;
  padding-bottom:env(safe-area-inset-bottom,0);
}
#musicBtn:active{transform:scale(.9)}

/* ===== Galaxy / tinh vân ===== */
.nebula{position:fixed;border-radius:50%;filter:blur(70px);mix-blend-mode:screen;
  pointer-events:none;opacity:.55;z-index:0}
.n1{width:70vw;height:70vw;left:-15vw;top:-10vh;
  background:radial-gradient(circle,rgba(150,60,255,.65),transparent 65%);
  animation:drift1 26s ease-in-out infinite}
.n2{width:65vw;height:65vw;right:-15vw;bottom:-10vh;
  background:radial-gradient(circle,rgba(255,60,150,.6),transparent 65%);
  animation:drift2 32s ease-in-out infinite}
.n3{width:55vw;height:55vw;left:25vw;top:35vh;
  background:radial-gradient(circle,rgba(60,180,255,.5),transparent 65%);
  animation:drift3 38s ease-in-out infinite}
@keyframes drift1{50%{transform:translate(12vw,8vh) scale(1.15)}}
@keyframes drift2{50%{transform:translate(-10vw,-8vh) scale(1.2)}}
@keyframes drift3{50%{transform:translate(6vw,-10vh) scale(1.1)}}

/* ===== Mobile ===== */
@media (max-width:480px){
  .ray{width:520px;height:520px;filter:blur(55px)}
  .r1{left:-150px;top:-150px}.r2{right:-150px;bottom:-150px}
  .nebula{filter:blur(50px);opacity:.45}
}
@media (prefers-reduced-motion:reduce){
  .hero,.amp,.ray,.nebula{animation:none}
}
</style></head>
<body>
<div class="nebula n1"></div><div class="nebula n2"></div><div class="nebula n3"></div>
<div class="ray r1"></div><div class="ray r2"></div>
<canvas id="c"></canvas>

<div class="hero">
  <div class="top">💖</div>
  <div class="name">Phương Linh</div>
  <span class="amp">❤️</span>
  <div class="name">BaoBei 🦢</div>
  <div class="sub">Forever &amp; Always</div>
</div>

<button id="musicBtn" aria-label="Bật/tắt nhạc">🔊</button>

<audio id="bgm" loop autoplay preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
/* ===== Nền sao ===== */
const cv=document.getElementById('c'),x=cv.getContext('2d');
function rs(){cv.width=innerWidth;cv.height=innerHeight}rs();onresize=rs;
const STAR_N=innerWidth<768?350:1000;
let stars=[...Array(STAR_N)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.8,a:Math.random(),d:Math.random()*.03}));
(function anim(){
  x.clearRect(0,0,cv.width,cv.height);
  for(const s of stars){s.a+=s.d;if(s.a>1||s.a<0)s.d*=-1;
    x.beginPath();x.arc(s.x,s.y,s.r,0,6.28);x.fillStyle=`rgba(255,255,255,${s.a})`;x.fill();}
  requestAnimationFrame(anim);
})();

/* ===== Hiệu ứng rơi ===== */
const icons=["❤️","💖","💕","💘","💝","🩷","💓","🦢"];
const names=["💖 Phương Linh","🦢 BaoBei","💕 Phương Linh","❤️ BaoBei"];
const isMobile=innerWidth<=480;
function mk(txt,cls){
  const e=document.createElement("div");
  e.className="item";e.textContent=txt;
  e.style.left=Math.random()*100+"vw";
  const min=isMobile?14:18, max=isMobile?32:56;
  e.style.fontSize=(min+Math.random()*(max-min))+"px";
  e.style.color=cls==="heart"?(Math.random()>.5?"#ff4f93":"#ff9ac8"):"#ffd6ec";
  e.style.textShadow="0 0 10px hotpink,0 0 25px deeppink";
  e.style.animationDuration=(5+Math.random()*8)+"s";
  document.body.appendChild(e);
  e.onanimationend=()=>e.remove();
}
/* mobile thưa hơn cho mượt */
setInterval(()=>{const n=isMobile?4:8;for(let i=0;i<n;i++)mk(icons[Math.floor(Math.random()*icons.length)],"heart");},140);
setInterval(()=>mk(names[Math.floor(Math.random()*names.length)],"name"),260);

/* ===== Nhạc: tự mở khi vào link ===== */
const bgm=document.getElementById("bgm");
const btn=document.getElementById("musicBtn");
bgm.volume=0.35;

function updateIcon(){btn.textContent=bgm.paused||bgm.muted?"🔇":"🔊";}

async function tryPlay(){
  try{ bgm.muted=false; await bgm.play(); }
  catch(e){
    /* Trình duyệt chặn phát có tiếng -> phát tắt tiếng trước,
       rồi bật tiếng ngay khi người dùng chạm màn hình lần đầu */
    try{ bgm.muted=true; await bgm.play(); }catch(_){}
    const unlock=async()=>{
      bgm.muted=false;
      try{ await bgm.play(); }catch(_){}
      updateIcon();
      document.removeEventListener("click",unlock);
      document.removeEventListener("touchstart",unlock);
      document.removeEventListener("keydown",unlock);
    };
    document.addEventListener("click",unlock,{once:true});
    document.addEventListener("touchstart",unlock,{once:true});
    document.addEventListener("keydown",unlock,{once:true});
  }
  updateIcon();
}
tryPlay();

/* Nút bật/tắt thủ công */
btn.addEventListener("click",e=>{
  e.stopPropagation();
  if(bgm.paused||bgm.muted){ bgm.muted=false; bgm.play(); }
  else{ bgm.pause(); }
  updateIcon();
});
</script>
</body></html>
